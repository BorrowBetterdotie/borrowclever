name: Fortnightly rate check

on:
  schedule:
    - cron: '0 8 1,15 * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  check-rates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run rate check
        id: check
        run: node scripts/check-rates.mjs
        continue-on-error: true

      - name: Commit results
        run: |
          git config user.name "borrowclever-bot"
          git config user.email "actions@users.noreply.github.com"
          git add rates/
          git diff --staged --quiet || git commit -m "Rate check: $(date +%Y-%m-%d)"
          git push

      - name: Fail workflow if issues detected
        if: steps.check.outcome == 'failure'
        run: exit 1
